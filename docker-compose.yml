version: '3.8'

services:
  db:
    image: postgres:17-alpine
    container_name: houseprice_db
    environment:
      POSTGRES_DB: houseprice
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432" # Maps port 5433 externally for compatibility
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: houseprice_redis
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: houseprice_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_worker:
    build: ./backend
    container_name: houseprice_celery
    command: celery -A backend worker --loglevel=info
    volumes:
      - ./backend:/app
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - db

  frontend:
    build: ./frontend
    container_name: houseprice_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
