name: Real Estate Analytics Platform CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libpq-dev libgl1 libglib2.0-0

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt

    - name: Run Django Configuration Checks
      run: |
        cd backend
        python manage.py check

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install NPM Dependencies
      run: |
        cd frontend
        npm install

    - name: Compile Vite Production Build
      run: |
        cd frontend
        npm run build

  docker-build:
    needs: [backend-checks, frontend-build]
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Verify Backend Docker Build
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false

    - name: Verify Frontend Docker Build
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: false
